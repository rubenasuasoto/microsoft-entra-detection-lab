title: Application Credential Added
id: ENTRA-006
status: experimental
description: Synthetic Entra audit review for credential changes on applications or service principals.
logsource:
  product: azure
  service: entra-id
  definition: directoryAudit
detection:
  selection:
    category: ApplicationManagement
    result: success
    activityDisplayName|contains: credential
  selection_properties:
    targetResources.modifiedProperties.displayName:
      - keyCredentials
      - passwordCredentials
  condition: selection or selection_properties
fields:
  - activityDateTime
  - activityDisplayName
  - category
  - operationType
  - result
  - initiatedBy
  - targetResources
  - modifiedProperties
falsepositives:
  - Approved secret rotation
  - Managed certificate renewal
level: medium
